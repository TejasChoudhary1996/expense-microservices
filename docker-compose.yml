version: "3.8"

services:

  discovery-server:
    build: ./discovery-server/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway/api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      - discovery-server

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server
      - mysql

  expense-service:
    build: ./expense-service
    container_name: expense-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server
      - mysql

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-server
      - api-gateway

  ui-service:
    build: ./ui-service
    container_name: ui-service
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: expense_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: